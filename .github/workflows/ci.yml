name: CI TODO-App FullStack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/todo-api/pom.xml') }}

      - name: Build and test
        run: mvn clean package
        working-directory: backend/todo-api
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: frontend/todo-web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/todo-web/package-lock.json') }}

      - name: Install dependencies
        run: npm install
        working-directory: frontend/todo-web

      - name: Build frontend
        run: npm run build
        working-directory: frontend/todo-web
