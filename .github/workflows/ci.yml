name: CI TODO-App FullStack

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  release:
    types: [created]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/todo-api/pom.xml') }}

      - name: Build project
        run: |
          echo 'iniciando build'
          mvn clean compile
          echo 'build finalizado'
        working-directory: backend/todo-api

      - name: Run tests
        run: |
          echo 'iniciando testes'
          mvn test -Dgroups=!e2e
          echo 'testes finalizados'
        working-directory: backend/todo-api

      - name: Generate JaCoCo report
        run: |
          echo 'gerando relatório de cobertura'
          mvn jacoco:report
          echo 'relatório de cobertura gerado'
        working-directory: backend/todo-api

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ github.run_id }}
          path: backend/todo-api/target/site/jacoco
          retention-days: 5

      - name: Package
        run: mvn package -DskipTests
        working-directory: backend/todo-api

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-${{ github.run_id }}
          path: backend/todo-api/target/*.jar

      - name: Backend pipeline summary
        if: always()
        run: |
          echo "## Backend Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "_Backend pipeline completed successfully!_" >> $GITHUB_STEP_SUMMARY
          echo "- Build, tests, and packaging are done." >> $GITHUB_STEP_SUMMARY
          echo "- JaCoCo report and JAR file have been uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: frontend/todo-web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/todo-web/package-lock.json') }}

      - name: Install dependencies
        run: npm install
        working-directory: frontend/todo-web

      - name: Build frontend
        run: npm run build
        working-directory: frontend/todo-web

      - name: Frontend pipeline summary
        if: always()
        run: |
          echo "## Frontend Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "_Frontend pipeline completed successfully!_" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies installed and frontend built." >> $GITHUB_STEP_SUMMARY
